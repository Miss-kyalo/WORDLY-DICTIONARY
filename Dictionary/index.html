<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORDLY - SPA Dictionary</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">

    <div class="container my-5" style="max-width: 800px;">
        <header class="text-center mb-5 position-relative">
            <h1 class="brand-title m-0 display-4 fw-bold">Wordly <span>Dictionary</span></h1>
            <button id="theme-toggle" class="btn btn-outline-secondary position-absolute top-50 end-0 translate-middle-y" aria-label="toggle light and dark mode">Switch Theme</button>
        </header>

        <main>
            <form id="search-form" class="mb-4">
                <div class="d-flex flex-column gap-3">
                    <label for="search-input" class="form-label fw-bold mb-0 text-start">Search a word:</label>
                    <input type="text" id="search-input" name="searchQuery" class="form-control form-control-lg text-center" placeholder="Search for a word..." aria-label="Search a word..." autocomplete="off" required>
                    <button id="search-button" class="btn btn-primary btn-lg w-100" type="submit">Search</button>
                </div>
            </form>

            <div id="loading-spinner" class="text-center my-4" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <div id="error-banner" class="alert alert-danger" style="display: none;" role="alert"></div>

            <section id="result-card" class="card p-4 mt-4" style="display: none;">
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <div class="d-flex align-items-center gap-3">
                        <h2 id="word-heading" class="m-0 text-capitalize"></h2>
                        <button id="audio-playback-btn" class="btn btn-outline-primary rounded-circle d-inline-flex align-items-center justify-content-center" style="display: none; width: 40px; height: 40px; padding: 0;" aria-label="play pronunciation audio">
                            <svg xmlns="http://w3.org" width="16" height="16" fill="currentColor" class="bi bi-volume-up-fill" viewBox="0 0 16 16">
                                <path d="M11.536 14.01A8.47 8.47 0 0 0 14 10.246a8.47 8.47 0 0 0-2.464-3.764.5.5 0 0 0-.707.707 7.47 7.47 0 0 1 2.17 3.057 7.47 7.47 0 0 1-2.17 3.057.5.5 0 0 0 .707.708m-1.425-2.22A4.5 4.5 0 0 0 10.11 8.21a4.5 4.5 0 0 0-.894.448 3.5 3.5 0 0 1 0 2.686.5.5 0 0 0 .894.448M10 3.36a.5.5 0 0 0-.707-.45L4.71 6H1.5A1.5 1.5 0 0 0 0 7.5v1A1.5 1.5 0 0 0 1.5 10h3.21l4.583 3.09a.5.5 0 0 0 .707-.45z"/>
                            </svg>
                        </button>
                    </div>
                    <button id="save-word-btn" class="btn btn-outline-success btn-sm" aria-label="Save word to favorites">Save Word</button>
                </div>
                <p id="pronunciation-text" class="text-muted fst-italic mb-3"></p>
                <div id="meanings-container"></div>    
                <div id="source-link-container" class="mt-3 pt-3 border-top small text-muted" style="display: none;"></div>
            </section>

            <section class="favorites-section mt-5">
                <h3 class="border-bottom pb-2 mb-3">Favorite Words</h3>
                <div id="favorites-container" class="d-flex flex-wrap gap-2">
                    <p class="text-muted fst-italic empty-msg">No favorite words saved yet.</p>
                </div>
            </section>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
